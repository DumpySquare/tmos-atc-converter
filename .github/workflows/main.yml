name: "Main"

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  NODE_VERSION: 20.x

jobs:

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    name: Test on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - run: npm run build
      - run: npm test

  package-release-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write
    name: Package-Release-Publish
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: install node deps
        run: npm ci

      - name: build
        run: npm run build

      - name: get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: get package name
        run: echo "PACKAGE_NAME=$(node -p "require('./package.json').name")" >> $GITHUB_ENV

      - name: pack tarball
        run: npm pack

      - name: create upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.tgz
          name: ${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.tgz

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: ${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}
          body: See [CHANGE LOG](CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: ${{ env.PACKAGE_NAME }}-${{ env.PACKAGE_VERSION }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
