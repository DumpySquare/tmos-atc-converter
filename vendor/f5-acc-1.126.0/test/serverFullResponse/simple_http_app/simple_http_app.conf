apm oauth db-instance /Common/oauthdb {
    description "Default OAuth DB."
}
apm report default-report {
    report-name sessionReports/sessionSummary
    user /Common/admin
}
ilx global-settings {
    debug-port-blacklist { 47019 54321 60000 }
}
ltm default-node-monitor {
    rule none
}
ltm node /Common/Shared/192.168.3.1 {
    address 192.168.3.1
}
ltm node /Common/Shared/192.168.2.1 {
    address 192.168.2.1
}
ltm pool /Common/Shared/web_pool {
    members {
        /Common/Shared/192.168.3.1:80 {
            address 192.168.3.1
            metadata {
                source {
                    value declaration
                }
            }
        }
        /Common/Shared/192.168.2.1:80 {
            address 192.168.2.1
            metadata {
                source {
                    value declaration
                }
            }
        }
    }
    min-active-members 1
    monitor min 1 of { /Common/http }
}
ltm virtual /Common/Shared/service {
    creation-time 2021-08-17:05:30:42
    description Shared
    destination /Common/Shared/10.0.1.10:80
    ip-protocol tcp
    last-modified-time 2021-08-17:05:30:42
    mask 255.255.255.255
    persist {
        /Common/cookie {
            default yes
        }
    }
    pool /Common/Shared/web_pool
    profiles {
        /Common/f5-tcp-progressive { }
        /Common/http { }
    }
    source 0.0.0.0/0
    source-address-translation {
        type automap
    }
    translate-address enabled
    translate-port enabled
}
ltm virtual-address /Common/Shared/10.0.1.10 {
    address 10.0.1.10
    arp enabled
    inherited-traffic-group true
    mask 255.255.255.255
    traffic-group /Common/traffic-group-1
}
ltm classification auto-update settings {
    auto-update-interval weekly
    enabled no
}
