apm oauth db-instance /Common/oauthdb {
    description "Default OAuth DB."
}
apm policy customization-source /Common/modern { }
apm policy customization-source /Common/standard { }
apm report default-report {
    report-name sessionReports/sessionSummary
    user /Common/admin
}
ilx global-settings {
    debug-port-blacklist { 47019 54321 60000 }
}
ltm default-node-monitor {
    rule none
}
ltm node /Common/192.168.1.1 {
    address 192.168.1.1
}
ltm node /Common/10.10.124.100 {
    address 10.10.124.100
}
ltm node /Common/10.10.124.101 {
    address 10.10.124.101
}
ltm node /Common/10.10.124.102 {
    address 10.10.124.102
}
ltm pool /Common/pool_http {
    members {
        /Common/10.10.124.100:80 {
            address 10.10.124.100
        }
        /Common/10.10.124.101:80 {
            address 10.10.124.101
        }
        /Common/10.10.124.102:80 {
            address 10.10.124.102
        }
    }
}
ltm pool /Common/pool_https {
    members {
        /Common/10.10.124.100:443 {
            address 10.10.124.100
        }
        /Common/10.10.124.101:443 {
            address 10.10.124.101
        }
        /Common/10.10.124.102:443 {
            address 10.10.124.102
        }
    }
}
ltm rule /Common/simple_irule {
when HTTP_RESPONSE {
    log local0.info "Journeys test (f5_irule=simple-rule-HTTP_RESPONSE)"
}

when LB_FAILED {
    log local0.info "Journeys test (f5_irule=simple-rule-LB_FAILED)"
}
}
ltm virtual /Common/vs_http_irule {
    creation-time 2022-08-16:06:21:12
    destination /Common/10.10.123.10:80
    ip-protocol tcp
    last-modified-time 2022-08-16:06:21:12
    mask 255.255.255.255
    pool /Common/pool_http
    profiles {
        /Common/http { }
        /Common/tcp { }
    }
    rules {
        /Common/simple_irule
    }
    serverssl-use-sni disabled
    source 0.0.0.0/0
    source-address-translation {
        type automap
    }
    translate-address enabled
    translate-port enabled
}
