ltm monitor diameter /Common/dummy_diameter {
    defaults-from /Common/diameter
    interval 10
    origin-realm f5.com
    product-name "F5 BIGIP Diameter Health Monitoring"
    time-until-up 0
    timeout 31
    vendor-id 3375
}
ltm profile server-ssl /Common/do-not-remove-without-replacement {
    app-service none
}
net dns-resolver /Common/f5-aws-dns {
    forward-zones {
