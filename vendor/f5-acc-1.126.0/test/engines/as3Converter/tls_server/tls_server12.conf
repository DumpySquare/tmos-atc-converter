ltm profile client-ssl /Common/test_profile_1 {
    app-service none
    cert-key-chain {
        ab.key.myapp.mmydomain_0 {
            cert /Common/ab.crt.myapp.mmydomain.com
            key /Common/ab.key.myapp.mmydomain.com
        }
    }
    defaults-from /Common/clientssl
    inherit-ca-certkeychain true
    inherit-certkeychain false
}
ltm profile client-ssl /Common/test_profile_2 {
    app-service none
    cert-key-chain {
        ab.key.myapp {
            cert /Common/ab.key.myapp.crt
            key /Common/ab.key.myapp.key
        }
    }
    defaults-from /Common/clientssl
    inherit-ca-certkeychain true
    inherit-certkeychain false
}
