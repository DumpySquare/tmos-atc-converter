ltm profile client-ssl /partition1/Common_app/clientssl_test_1 {
    app-service none
    cert-key-chain {
        test_cert_0 {
            cert /partition1/Common_app/test_cert_1
            key /partition1/Common_app/test_cert_1
        }
    }
    defaults-from /Common/clientssl
    inherit-ca-certkeychain true
    inherit-certkeychain false
}
