ltm profile client-ssl /partition1/application_1/clientssl_test {
    app-service none
    cert-key-chain {
        journeys_cert_0 {
            cert /partition1/application_1/test_cert.crt
            key /partition1/application_1/test_cert.key
        }
    }
    defaults-from /Common/clientssl
    inherit-ca-certkeychain true
    inherit-certkeychain false
}
sys file ssl-cert /partition1/application_1/test_cert {
    cache-path /config/filestore/files_d/Common_d/certificate_d/:Common:test_cert_128647_1
    revision 1
    source-path /var/run/key_mgmt/Dr6fVJ/ssl.crt/test_cert
}
sys file ssl-key /partition1/application_1/test_cert {
    cache-path /config/filestore/files_d/Common_d/certificate_key_d/:Common:test_cert_128644_1
    revision 1
    source-path /var/run/key_mgmt/PwR6QE/ssl.key/test_cert
}
