net route-domain /Common/rd5 {
    id 5
    vlans {
        /Common/vlan5
    }
}
 
auth partition TEST {
    default-route-domain 5
}
 
ltm virtual /Common/virt_ip_forwarding {
    destination /Common/0.0.0.0%5:0
    ip-forward
    ip-protocol tcp
    mask 255.255.255.255
    profiles {
        /Common/fastL4 { }
    }
    pool /Common/pool_different_rds
    serverssl-use-sni disabled
    source 0.0.0.0%5/32
    vlans {
        /Common/vlan1
        /Common/vlan5
    }
    vlans-enabled
}
 
ltm virtual-address /Common/0.0.0.0%5 {
    address any%5
    arp disabled
    icmp-echo disabled
    mask 255.255.255.255
    traffic-group /Common/traffic-group-1
}
 
ltm pool /Common/pool_different_rds {
    members {
        /Common/node7:0 {
            address 10.10.10.7%7
        }
        /Common/rd5:80 {
            address 10.13.14.5%5
        }
    }
}
 
ltm node /Common/node7 {
    address 10.10.10.7%7
}
ltm node /Common/rd5 {
    address 10.3.4.5%5
}
 
net route-domain /Common/rd7 {
    id 7
    vlans {
        /Common/vlan7
    }
}