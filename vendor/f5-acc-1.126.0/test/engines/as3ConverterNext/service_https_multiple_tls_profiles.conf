ltm virtual /Common/VS_two_ssl_with_numbers {
    creation-time 2023-12-08:06:28:56
    destination /Common/10.10.10.11:443
    ip-protocol tcp
    last-modified-time 2023-12-08:06:28:56
    mask 255.255.255.255
    profiles {
        /Common/http { }
        /Common/profile-a {
            context clientside
        }
        /Common/clientssl {
            context clientside
        }
        /Common/profile-b {
            context serverside
        }
        /Common/serverssl {
            context serverside
        }
        /Common/tcp { }
    }
    serverssl-use-sni disabled
    source 0.0.0.0/0
    translate-address enabled
    translate-port enabled
}
ltm profile server-ssl /Common/profile-a {
    app-service none
    authenticate-name none
    cert /Common/cert1
    cipher-group none
    ciphers DEFAULT
    description none
    key /Common/cert1
    peer-cert-mode ignore
    server-name none
    session-ticket disabled
    untrusted-cert-response-control drop
}
ltm profile client-ssl /Common/profile-b {
    app-service none
    cert-key-chain {
        cert2_0 {
            cert /Common/cert2
            key /Common/cert2
        }
    }
    defaults-from /Common/serverssl
    inherit-ca-certkeychain true
    inherit-certkeychain false
}
sys file ssl-cert /Common/cert.crt {
    cache-path /config/filestore/files_d/Common_d/certificate_d/:Common:cert.crt_121202_1
    revision 1
    source-path file:/var/config/rest/downloads/_Common_cert.crt
}
sys file ssl-key /Common/cert.key {
    cache-path /config/filestore/files_d/Common_d/certificate_key_d/:Common::cert.key_121206_1
    revision 1
    source-path file:/var/config/rest/downloads/_Common_cert.key
}
