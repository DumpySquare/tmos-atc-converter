ltm profile http-compression /Common/test_compression_http_1 {
    allow-http-10 enabled
    app-service none
    buffer-size 131072
    content-type-exclude none
    content-type-include { text/ "application/(xml|x-javascript)" }
    defaults-from /Common/httpcompression
    gzip-memory-level 16k
    uri-exclude none
    uri-include { .* }
}
ltm profile http-compression /Common/test_compression_http_2 {
    app-service none
    content-type-exclude { application/text application/json }
    content-type-include { application/(xml|x-javascript) application/x-javascript application/http }
    defaults-from /Common/httpcompression
}
ltm profile http-compression /Common/test_compression_http_3 {
    app-service none
    content-type-exclude { application/(xml|x-javascript) application/jpg application/http }
    content-type-include { application/text application/json }
    defaults-from /Common/httpcompression
}
