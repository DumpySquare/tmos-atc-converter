ltm virtual /tenant_1/application_1/Common_vs_customCA_sameSSL {
    destination /tenant_1/application_1/10.10.123.83:443
    ip-protocol tcp
    mask 255.255.255.255
    profiles {
        /tenant_1/application_1/clientssl_customCA_sameSSL {
            context clientside
        }
        /Common/tcp { }
    }
    serverssl-use-sni disabled
    source 0.0.0.0/0
    translate-address enabled
    translate-port enabled
}
sys file ssl-cert /tenant_1/application_1/RSA {
    cache-path /config/filestore/files_d/Common_d/certificate_d/:Common:RSA_63698_1
    revision 1
    source-path /var/run/key_mgmt/BXBiv4/ssl.crt/RSA
}
sys file ssl-key /tenant_1/application_1/RSA {
    cache-path /config/filestore/files_d/Common_d/certificate_key_d/:Common:RSA_63695_1
    revision 1
    source-path /var/run/key_mgmt/qmyHBX/ssl.key/RSA
}
ltm profile client-ssl /tenant_1/application_1/clientssl_customCA_sameSSL {
    app-service none
    cert-key-chain {
        RSA_0 {
            cert /tenant_1/application_1/RSA
            key /tenant_1/application_1/RSA
        }
        RSA_1 {
            cert /tenant_1/application_1/RSA
            key /tenant_1/application_1/RSA
            usage CA
        }
    }
    ciphers DEFAULT
    options { dont-insert-empty-fragments no-tlsv1.3 no-dtlsv1.2 }
}
ltm virtual-address /tenant_1/application_1/10.10.123.83 {
    address 10.10.123.83
    arp enabled
    icmp-echo enabled
    mask 255.255.255.255
    traffic-group /Common/traffic-group-1
}
