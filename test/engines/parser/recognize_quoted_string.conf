# Bracket on line 5 is throwing things off

security dos bot-signature "/Common/Bash Shellshock" {
    category "/Common/Exploit Tool"
    rule "headercontent:\"() {\"; useragentonly; nocase;"
    user-defined false
}
security dos bot-signature "/Common/Bichoo Spider" {
    category "/Common/Web Spider"
    risk high
    rule "headercontent:\"Bichoo Spider\"; useragentonly; nocase;"
    user-defined false
}
ltm rule /Common/test_rule {
    when HTTP_RESPONSE {
        if { [string map {\" ""} [HTTP::cookie "JSESSIONID"]] ne "" } {
                log -noname local0. "test"
        }
    }
}
