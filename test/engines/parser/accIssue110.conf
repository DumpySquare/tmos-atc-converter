ltm pool /Common/Portal_pool {
    load-balancing-mode least-connections-node
    members {
        /Common/10.160.17.21:80 {
            address 10.160.17.21
        }
        /Common/10.160.17.22:80 {
            address 10.160.17.22
        }
    }
    monitor /Common/http
}
ltm node /Common/10.160.17.21 {
    address 10.160.17.21
}
ltm node /Common/10.160.17.22 {
    address 10.160.17.22
}
ltm profile http /Common/portal_http {
    app-service none
    defaults-from /Common/http
    insert-xforwarded-for enabled
    redirect-rewrite matching
}
ltm profile one-connect /Common/portal_oneconnect {
    app-service none
    defaults-from /Common/oneconnect
    source-mask any
}
ltm profile tcp /Common/portal_tcp-lan-optimized {
    app-service none
    defaults-from /Common/tcp-lan-optimized
    syn-cookie-enable enabled
}
ltm profile tcp /Common/portal_tcp-wan-optimized {
    app-service none
    defaults-from /Common/tcp-wan-optimized
    syn-cookie-enable enabled
}
ltm profile client-ssl /Common/ea_wildcard {
    app-service none
    cert /Common/Wildcard_Ea_2026
    cert-key-chain {
        Wildcard_Ea_2026_Wildcard_Ea_2026_0 {
            cert /Common/Wildcard_Ea_2026
            chain /Common/Wildcard_Ea_2026
            key /Common/Wildcard_Ea_2026
        }
    }
    chain /Common/Wildcard_Ea_2026
    cipher-group none
    ciphers DEFAULT:!sslv3:!rc4:!exp:!des:!dhe:!3des:!RSA
    defaults-from /Common/clientssl
    inherit-ca-certkeychain true
    inherit-certkeychain false
    key /Common/Wildcard_Easa_2026
    options { dont-insert-empty-fragments no-ssl no-tlsv1.3 no-tlsv1.1 single-dh-use no-dtlsv1.2 no-sslv3 no-tlsv1 }
    passphrase none
}
