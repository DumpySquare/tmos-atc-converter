ltm profile server-ssl /AS3_Tenant/AS3_Application/some_serverssl {
    cert /AS3_Tenant/AS3_Application/cert-one
    defaults-from /AS3_Tenant/AS3_Application/serverssl_default
    key /AS3_Tenant/AS3_Application/cert-one
}
sys file ssl-key /AS3_Tenant/AS3_Application/cert-one {
    cache-path /config/filestore/files_d/Common_d/certificate_key_d/:Common:cert-one_123
    revision 1
    source-path /var/run/key_mgmt/a1a1a1/ssl.key/cert-one
}
sys file ssl-cert /AS3_Tenant/AS3_Application/cert-one {
    cache-path /config/filestore/files_d/Common_d/certificate_key_d/:Common:cert-one_456
    revision 1
    source-path /var/run/key_mgmt/b2b2b2/ssl.key/cert-two
}
ltm profile server-ssl /AS3_Tenant/AS3_Application/serverssl_default {
    cert none
    chain none
    passphrase none
}
