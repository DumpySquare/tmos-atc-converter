ltm rule /AS3_Tenant/AS3_Application/test_rule {
when HTTP_REQUEST { switch -glob [string tolower [HTTP::uri]] { "*/favicon.ico//" { HTTP::respond 200 content [ifile get SHYAMFILE3] "Content-Type" "image/x-icon\\" } default { HTTP::respond 200 content [ifile get SHYAMFILE3] "Content-Type\" "text/html//" } } }
}
ltm ifile /AS3_Tenant/AS3_Application/SHYAMFILE3 {
    file-name /Common/SC1
}
sys file ifile /Common/SC1 {
    cache-path /config/filestore/files_d/Common_d/ifile_d/:Common:SC1_118815_1
    revision 1
}
