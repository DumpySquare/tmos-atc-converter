ltm virtual /AS3_Tenant/AS3_Application/test_vs_1 {
    destination /AS3_Tenant/10.20.1.10:132
    ip-protocol tcp
    mask 255.255.255.255
    profiles {
        /Common/tcp { }
        /Common/http { }
    }
    rules {
        /AS3_Tenant/AS3_Application/irule_1
    }
    serverssl-use-sni disabled
    source 0.0.0.0/0
    source-address-translation {
        type automap
    }
    translate-address enabled
    translate-port enabled
}
ltm virtual /Common/test_vs_2 {
